<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronista de Sombras | Cine-Realismo</title>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@12.3.2/dist/markdown-it.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid #222; box-shadow: 0 0 60px rgba(0,0,0,0.9); }
        h1 { text-align: center; color: var(--gold); font-variant: small-caps; letter-spacing: 5px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 30px; }
        .section { background: #1a1a1a; padding: 20px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #333; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; font-size: 0.75em; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; margin-bottom: 15px; border-radius: 4px; font-family: inherit; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; background: var(--gold); color: black; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; border-radius: 4px; font-size: 0.85em; }
        button:hover { background: #fff; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status { text-align: center; color: var(--gold); font-style: italic; margin-bottom: 15px; font-size: 0.9em; }
        .output-box { background: #000; padding: 25px; border-left: 3px solid var(--gold); margin-top: 20px; display: none; line-height: 1.7; }
        .actor-box { border-left-color: #00ffcc !important; background: #0a1111 !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cronista de Sombras</h1>
    
    <div class="section">
        <label>Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Sua chave API...">
        
        <label>Tema do Documentário Histórico:</label>
        <input type="text" id="tema" placeholder="Ex: A conspiração contra Dom Pedro I">
    </div>

    <div id="status">Aguardando comando inicial...</div>

    <div class="btn-group">
        <button id="btnRoteiro1" onclick="executar('roteiro1')">1. Gerar Roteiro (Bloco 1)</button>
        <button id="btnRoteiro2" onclick="executar('roteiro2')" disabled>2. Gerar Roteiro (Bloco 2)</button>
        <button id="btnExtrair" onclick="executar('atores')" disabled>3. Extrair Personagens (Atores)</button>
    </div>

    <div class="btn-group">
        <button id="btnCenas1" onclick="executar('cenas1')" disabled>Cenas 1-20</button>
        <button id="btnCenas2" onclick="executar('cenas2')" disabled>Cenas 21-40</button>
        <button id="btnCenas3" onclick="executar('cenas3')" disabled>Cenas 41-60</button>
        <button id="btnCenas4" onclick="executar('cenas4')" disabled>Cenas 61-80+</button>
    </div>

    <div id="area_atores" class="output-box actor-box"></div>
    <div id="area_roteiro" class="output-box"></div>
    <div id="area_cenas" class="output-box" style="border-left-color: #555;"></div>
</div>

<script>
    let roteiroCache = "";
    let blocosCena = [];

    async function executar(modo) {
        const key = document.getElementById('apiKey').value;
        const tema = document.getElementById('tema').value;
        const status = document.getElementById('status');
        
        if (!key || !tema) return alert("Preencha a Key e o Tema.");
        status.innerText = "IA trabalhando na narrativa...";

        let prompt = "";

        if (modo === 'roteiro1') {
            prompt = `Escreva o BLOCO 1 (850 palavras exatas) de um roteiro de 1700 palavras sobre "${tema}". Use o tom documental imersivo, focado em storytelling e psicologia histórica. Idioma: Português Brasil.`;
        } else if (modo === 'roteiro2') {
            prompt = `Continue o roteiro sobre "${tema}". Escreva o BLOCO 2 (Final - 850 palavras exatas). Layers 4-6. Final épico. Roteiro anterior: ${roteiroCache.substring(roteiroCache.length - 400)}`;
        } else if (modo === 'atores') {
            prompt = `Analise este roteiro histórico: "${roteiroCache}". 
            Identifique os personagens reais mencionados. Para cada um, crie um prompt para o gerador FLUX descrevendo um "Ator profissional de cinema interpretando o personagem". 
            Regras: Use termos como "Professional actor portraying [NOME]", "high-end cinematic prosthetic makeup", "period-accurate costume". 
            FOCO: Garantir que pareça uma produção de cinema de alto orçamento (estilo Netflix/HBO), não uma foto real do personagem, para respeitar as políticas de imagem. Saída em Inglês técnico.`;
        } else {
            const num = modo.replace('cenas', '');
            const trecho = blocosCena[num - 1];
            prompt = `Você é um Diretor de Storyboard. Gere 20 cenas para este trecho: "${trecho}". 
            REGRAS: 
            - 20 cenas obrigatórias.
            - Menção a personagens apenas entre colchetes: [NOME].
            - Prompt VEO: Ultra-realistic 8K photogrammetry shot, found-footage documentary style. Cinematic historical lighting. 
            - Negativos: No music, no score, no narration, no lip movement, no absurd scenes.
            - Formato: Cena X | Trecho Roteiro | Prompt VEO em Inglês.`;
        }

        try {
            const res = await chamarGemini(key, prompt);
            const md = window.markdownit();

            if (modo.includes('roteiro')) {
                roteiroCache += " " + res;
                document.getElementById('area_roteiro').innerHTML += `<h2>${modo}</h2>` + md.render(res);
                document.getElementById('area_roteiro').style.display = 'block';
                if (modo === 'roteiro1') document.getElementById('btnRoteiro2').disabled = false;
                if (modo === 'roteiro2') {
                    document.getElementById('btnExtrair').disabled = false;
                    prepararBlocosCena();
                }
            } else if (modo === 'atores') {
                document.getElementById('area_atores').innerHTML = `<h3>Guia de Elenco (Prompts Flux)</h3>` + md.render(res);
                document.getElementById('area_atores').style.display = 'block';
                document.getElementById('btnCenas1').disabled = false;
                document.getElementById('btnCenas2').disabled = false;
                document.getElementById('btnCenas3').disabled = false;
                document.getElementById('btnCenas4').disabled = false;
            } else {
                document.getElementById('area_cenas').innerHTML = `<h3>Lote de Cenas ${modo}</h3>` + md.render(res);
                document.getElementById('area_cenas').style.display = 'block';
            }
            status.innerText = "Processo finalizado.";
        } catch (e) { alert(e.message); status.innerText = "Erro."; }
    }

    function prepararBlocosCena() {
        const palavras = roteiroCache.split(" ");
        blocosCena = [
            palavras.slice(0, 425).join(" "),
            palavras.slice(425, 850).join(" "),
            palavras.slice(850, 1275).join(" "),
            palavras.slice(1275).join(" ")
        ];
    }

    async function chamarGemini(key, prompt) {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
    }
</script>

</body>
</html>
